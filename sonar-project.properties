sonar.projectName=ar-ai-exe
sonar.sourceEncoding=UTF-8

# Project identity is passed by GitHub Actions from repository variables:
# - SONAR_PROJECT_KEY
# - SONAR_ORGANIZATION

sonar.sources=backend/app,backend/alembic,frontend/src,mobile/lib,deploy,scripts,.github/workflows,docker-compose.yml,docker-compose.dev.yml
sonar.tests=backend/tests,mobile/test
sonar.test.inclusions=backend/tests/**/*.py,mobile/test/**/*.dart

sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.vite/**,**/.venv/**,**/__pycache__/**,**/.dart_tool/**,backend/storage/**,mobile/android/**,mobile/ios/**,mobile/linux/**,mobile/macos/**,mobile/web/**,mobile/windows/**
sonar.coverage.exclusions=backend/alembic/**,backend/tests/**,mobile/test/**,deploy/**,scripts/**,.github/workflows/**

sonar.python.version=3.11
