x-backend-build: &backend_build
  context: ./backend
  dockerfile: Dockerfile
  args:
    OPENMVS_REF: ${OPENMVS_REF:-v2.4.0}
    OPENMVS_BUILD_JOBS: ${OPENMVS_BUILD_JOBS:-2}

x-3d-runtime-environment: &3d_runtime_environment
  RECONSTRUCTION_MAX_THREADS: ${APP_RECONSTRUCTION_MAX_THREADS:-2}
  OMP_NUM_THREADS: ${APP_RECONSTRUCTION_MAX_THREADS:-2}
  OPENBLAS_NUM_THREADS: ${APP_RECONSTRUCTION_MAX_THREADS:-2}
  MKL_NUM_THREADS: ${APP_RECONSTRUCTION_MAX_THREADS:-2}
  NUMEXPR_NUM_THREADS: ${APP_RECONSTRUCTION_MAX_THREADS:-2}

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - app_internal
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: *backend_build
    restart: unless-stopped
    env_file:
      - ./deploy/backend.env
    environment:
      <<: *3d_runtime_environment
    cpus: ${BACKEND_CPUS:-2.0}
    mem_limit: ${BACKEND_MEMORY_LIMIT:-6g}
    memswap_limit: ${BACKEND_MEMORY_SWAP_LIMIT:-10g}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - backend_storage:/app/storage
    networks:
      - app_internal
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  worker:
    build: *backend_build
    restart: unless-stopped
    command: ["python", "-m", "app.workers.rq_worker"]
    env_file:
      - ./deploy/backend.env
    environment:
      <<: *3d_runtime_environment
    cpus: ${WORKER_CPUS:-1.0}
    mem_limit: ${WORKER_MEMORY_LIMIT:-2g}
    memswap_limit: ${WORKER_MEMORY_SWAP_LIMIT:-4g}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_storage:/app/storage
    networks:
      - app_internal

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_MARKETING_LOGIN_URL: ${MARKETING_LOGIN_URL:-https://kusshoes.vn/login}
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-:80}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app_internal

networks:
  app_internal:
    driver: bridge

volumes:
  backend_storage:
  caddy_data:
  caddy_config:
